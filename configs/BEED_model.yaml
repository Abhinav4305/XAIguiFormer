root: "EEGBenchmarkDataset"
dataset: "BEED"
model_name: "XAIguiFormer"

# We only have one mock frequency band to satisfy the model requirement structure.
connectome:
  frequency_band:
    theta: [4.0, 8.0]
  methods: ['coh', 'wpli']
  path:
    data_dir: "<preprocessed-path-to-preprocessed-data>"
    save_dir: "<save-path-to-connectome>"

model:
  num_node_feat: 16 # Flattened coherence matrix diagonal gives 16 features per node
  num_edge_feat: 1 # Our pseudo-wpli edge weight is just distance between features
  dim_node_feat: 64
  dim_edge_feat: 64
  num_classes: 4 
  num_gnn_layer: 2
  num_head: 4
  num_transformer_layer: 4 
  gnn_type: 'GINEConv'
  dropout: 0.1
  explainer_type: 'DeepLift'
  mlp_ratio: 4.
  init_values: 0.001
  attn_drop: 0.1
  droppath: 0.1

# 30% split (8002 * 0.3 = 2400 in train)
# High batch size for faster convergence since it's just 1D tables
train:
  epochs: 50
  batch_size: 128
  optimizer:
    lr: 0.0001
    weight_decay: 0.01
    eps: !!float 1e-8
    betas: [0.9, 0.99]
  lr_scheduler:
    lr_min: !!float 1e-7
    warmup_epochs: 5
    warmup_lr: !!float 1e-7
  criterion:
    smoothing: 0.1
    alpha: 0.5
aug:
  mixup_prob: 0.0
  mixup_switch_prob: 0.0
  mixup: 0.0
  cutmix: 0.0
  mixup_mode: "batch"
  cutmix_minmax: null

out_root: "output"
print_freq: 5
num_workers: 2
seed: 42
pretrain: False
pretrained_model: ""
