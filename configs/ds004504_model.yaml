######################################
# basic settings
######################################
dataset: ds004504
root: EEGBenchmarkDataset
out_root: output
num_workers: 2
seed: 42

######################################
# model settings
######################################
model:
  num_node_feat: 19
  num_edge_feat: 1
  num_classes: 2
  num_head: 4
  dim_node_feat: 128
  dim_edge_feat: 128
  gnn_type: GINEConv
  num_gnn_layer: 4
  num_transformer_layer: 6
  explainer_type: DeepLift
  mlp_ratio: 4.
  init_values: 0.001

######################################
# train settings
######################################
train:
  batch_size: 16
  epochs: 30
  criterion:
    alpha: 0.7
  optimizer:
    lr: 4e-5
    weight_decay: 1e-4
  lr_scheduler:
    warmup_epochs: 3
    warmup_lr: 1e-7

######################################
# augmentation settings
######################################
aug:
  mixup_prob: 0.5
